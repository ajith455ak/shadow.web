name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Start FastAPI Server
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: shadow_test
          JWT_SECRET: testsecretkey123
          ENABLE_DEMO_TOKENS: 'true'
        run: |
          cd backend
          python -m uvicorn server:app --port 8001 &
          timeout 15s bash -c 'until echo > /dev/tcp/127.0.0.1/8001; do sleep 0.5; done' || (echo "Server failed to start" && exit 1)

      - name: Run Pytest
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: shadow_test
          JWT_SECRET: testsecretkey123
          ENABLE_DEMO_TOKENS: 'true'
        run: |
          cd backend
          python -m pytest --ignore=tests/test_selenium.py --junitxml=backend_report.xml
          cp backend_report.xml ../backend_report.xml

      - name: Upload Backend Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-report
          path: backend_report.xml

  frontend-ci:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../backend/requirements.txt

      - name: Start FastAPI Backend Server
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: shadow_test
          JWT_SECRET: testsecretkey123
          ENABLE_DEMO_TOKENS: 'true'
        run: |
          cd ../backend
          python -m uvicorn server:app --port 8001 &
          timeout 15s bash -c 'until echo > /dev/tcp/127.0.0.1/8001; do sleep 0.5; done' || (echo "Backend failed to start" && exit 1)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install Frontend Dependencies
        run: yarn install --frozen-lockfile

      - name: Run Linter
        run: yarn lint

      - name: Build Expo Web App
        run: npx expo export

      - name: Start Frontend Server
        run: |
          npx serve -s dist -l 8081 &
          timeout 15s bash -c 'until echo > /dev/tcp/127.0.0.1/8081; do sleep 0.5; done' || (echo "Frontend failed to start" && exit 1)

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run E2E UI Tests
        env:
          BACKEND_URL: http://localhost:8001
          FRONTEND_URL: http://localhost:8081
          ENABLE_DEMO_TOKENS: 'true'
        run: |
          node e2e_test.js > e2e_report.log 2>&1

      - name: Run E2E Selenium Tests
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: shadow_test
          JWT_SECRET: testsecretkey123
          ENABLE_DEMO_TOKENS: 'true'
          FRONTEND_URL: http://localhost:8081
        run: |
          cd ../backend
          python -m pytest tests/test_selenium.py -v --junitxml=selenium_report.xml
          cp selenium_report.xml ../selenium_report.xml

      - name: Copy Playwright report to root
        if: always()
        run: |
          cp playwright_report.json ../playwright_report.json

      - name: Upload E2E Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: |
            frontend/e2e_report.log
            frontend/screenshots/
            playwright_report.json
            selenium_report.xml

  backend-docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false

  generate-summary:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-ci]
    if: always()
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Backend Report
        uses: actions/download-artifact@v4
        with:
          name: backend-report
          path: .
        continue-on-error: true

      - name: Download E2E Reports
        uses: actions/download-artifact@v4
        with:
          name: e2e-test-reports
          path: .
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Generate Step Summary
        run: |
          cp backend/generate_summary.py .
          python generate_summary.py

      - name: Install Openpyxl dependency
        run: |
          python -m pip install openpyxl

      - name: Generate Excel Automation Report
        run: |
          python backend/generate_excel.py

      - name: Upload Excel Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Excel-Automation-Report
          path: Selenium_Test_Automation_Report.xlsx
