name: Deploy to Render

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Trigger Deploy and Wait for Completion
        run: |
          cd backend
          python trigger_deploy.py > deploy_res.json
          cat deploy_res.json
          # Extract the deploy ID from the json response (locating the JSON block)
          DEPLOY_ID=$(python -c "import json; content = open('deploy_res.json').read(); start = content.find('{'); print(json.loads(content[start:])['id'])")
          echo "Triggered Deploy ID: $DEPLOY_ID"
          
          # Query deploy status until live or failed
          python wait_for_deploy.py "$DEPLOY_ID"
